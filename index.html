<!DOCTYPE html>

<html>

<head>


<title>PVR Appliances</title>

<link rel="stylesheet" href="style.css">


</head>

<body>

<header>

<div>

</div>


</header>

<section class="products">


<div class="card">

    <h2>Mobile Phone</h2>

    <p>Latest smartphone</p>

    <h3>₹20000</h3>

    <button onclick="addCart('Mobile Phone',20000)">
        Add To Cart
    </button>

</div>

<div class="card">

    <h2>Laptop</h2>

    <p>High performance laptop</p>

    <h3>₹60000</h3>

    <button onclick="addCart('Laptop',60000)">
        Add To Cart
    </button>

</div>

<div class="card">

    <h2>Headphones</h2>

    <p>Wireless headphones</p>

    <h3>₹3000</h3>

    <button onclick="addCart('Headphones',3000)">
        Add To Cart
    </button>

</div>

<div class="card">

    <h2>Bluetooth Earbuds</h2>

    <p>Wireless earbuds</p>

    <h3>₹2000</h3>

    <button onclick="addCart('Bluetooth Earbuds',2000)">
        Add To Cart
    </button>

</div>

<div class="card">

    <h2>Smart TV</h2>

    <p>55 inch 4K Ultra HD Smart TV</p>

    <h3>₹40000</h3>

    <button onclick="addCart('Smart TV',40000)">
        Add To Cart
    </button>

</div>


</section>

<h2 class="title">


Shopping Cart


</h2>

Your cart is empty

</div>
